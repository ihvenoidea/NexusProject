name: NexusProject
version: 1.0-SNAPSHOT
main: main_plugin.NexusCore
api-version: "1.21"
depend: [Vault]
softdepend: [Citizens]

commands:
  # --- 경제 및 포인트 관리 ---
  money:
    description: 현재 보유한 게임 머니를 확인합니다.
    aliases: [돈, 잔액]
  nexus:
    description: 넥서스 플러그인 핵심 관리자 명령어입니다.
    permission: nexus.admin
  포인트:
    description: 내 포인트를 확인하거나 포인트 상점을 엽니다.
  dp:
    description: 디스코드 포인트(DP) 지급 및 관리 명령어입니다.
    permission: nexus.admin.dp

  # --- 이벤트 및 레이드 시스템 ---
  조공:
    description: 서버에 자원을 조공하여 랭킹에 등록합니다.
  조공순위:
    description: 현재 조공 랭킹 상위권을 확인합니다.
  조공종료:
    description: 진행 중인 조공 이벤트를 강제로 종료합니다.
    permission: nexus.admin
  공성전:
    description: 시간 제한 없는 무제한 넥서스 코어 레이드를 관리합니다.
    permission: nexus.admin

  # --- 아이템, 증강체, 도감 시스템 ---
  setitem:
    description: 등급별 네더라이트 세트 장비를 지급합니다.
    usage: /setitem 지급 <플레이어> <세트이름> <부위>
    permission: nexus.admin
  도감:
    description: 수집한 아이템, 증강체 목록과 보상을 확인하는 도감 창을 엽니다.

  # --- 타운(부동산) 시스템 ---
  타운:
    description: 개인 영지(타운) 생성 및 보호 구역 설정 명령어입니다.